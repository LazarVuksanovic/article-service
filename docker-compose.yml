version: '3.8'

services:
  watchtower:
    image: containrrr/watchtower
    container_name: watchtower
    restart: always
    command:
      - "--label-enable"
      - "--interval"
      - "30"
      - "--rolling-restart"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /root/.docker/config.json:/config.json:ro

  reverse-proxy:
    image: traefik:v3.3
    container_name: traefik
    command:
      - "--api.dashboard=true"
      - "--providers.docker"
      - "--providers.docker.exposedbydefault=false"
      - "--entryPoints.web.address=:80"
      - "--entryPoints.websecure.address=:443"
      # Global Redirect to HTTPS
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      # SSL Certs
      - "--certificatesresolvers.myresolver.acme.tlschallenge=true"
      - "--certificatesresolvers.myresolver.acme.email=lazar.vuksanovic17@gmail.com"
      - "--certificatesresolvers.myresolver.acme.storage=/letsencrypt/acme.json"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - letsencrypt:/letsencrypt
    environment:
      TZ: Europe/Belgrade
    networks:
      - app-network
    labels:
      - "traefik.enable=true"
      # --- Traefik Dashboard Configuration ---
      # 1. Router Available at https://admin.pravda.rs/traefik/
      - "traefik.http.routers.dashboard.rule=Host(`admin.pravda.rs`) && PathPrefix(`/traefik`)"
      - "traefik.http.routers.dashboard.service=api@internal"
      - "traefik.http.routers.dashboard.entrypoints=websecure"
      - "traefik.http.routers.dashboard.tls.certresolver=myresolver"
      # 2. Middlewares: Strip path + Auth
      - "traefik.http.routers.dashboard.middlewares=dashboard-strip,dashboard-auth"
      - "traefik.http.middlewares.dashboard-strip.stripprefix.prefixes=/traefik"
      # IMPORTANT: Replace 'admin' and the hash below.
      # Generate with: echo $(htpasswd -nB admin) | sed -e s/\\$/\\$\\$/g
      # Current user: pradmin, password: pravdica123 (CHANGE THIS!)
      - "traefik.http.middlewares.dashboard-auth.basicauth.users=pradmin:$$2y$$05$$kfg4UClWr0n1pIyUbtX2kOzO6b/3CWcOaWtv6Ak/q.4HjpuaEGeT."

  frontend:
    image: ghcr.io/lazarvuksanovic/pravda-frontend:latest
    container_name: pravda-frontend
    restart: always
    depends_on:
      - backend
    labels:
      - "traefik.enable=true"
      - "com.centurylinklabs.watchtower.enable=true"
      - "traefik.http.services.frontend.loadbalancer.server.port=3000"

      # --- MIDDLEWARES DEFINITION ---

      # 1. Archive Redirect (Regex Match -> Redirect to External Site)
      # Matches: /YYYY/MM/DD/slug
      # Redirects to: https://pravda.rs/YYYY/MM/DD/slug
      - "traefik.http.middlewares.archive-redirect.redirectregex.regex=^https?://[^/]+/([0-9]{4}/[0-9]{2}/[0-9]{2}/.*)"
      - "traefik.http.middlewares.archive-redirect.redirectregex.replacement=https://pravda.rs/$${1}"
      - "traefik.http.middlewares.archive-redirect.redirectregex.permanent=true"

      # 2. Homepage Redirect
      - "traefik.http.middlewares.root-redirect.redirectregex.regex=^https?://[^/]+/?$$"
      - "traefik.http.middlewares.root-redirect.redirectregex.replacement=https://plus.pravda.rs/naslovna/"

      # 3. Latin Redirect
      - "traefik.http.middlewares.lat-redirect.redirectregex.regex=^https?://[^/]+/lat/?$$"
      - "traefik.http.middlewares.lat-redirect.redirectregex.replacement=https://plus.pravda.rs/lat/naslovna/"

      # --- ROUTERS ---

      # Main App Router (plus.pravda.rs)
      - "traefik.http.routers.frontend.rule=Host(`plus.pravda.rs`)" # || Host(`www.plus.pravda.rs`)"
      - "traefik.http.routers.frontend.entrypoints=websecure"
      - "traefik.http.routers.frontend.tls.certresolver=myresolver"

      # *** KEY CHANGE HERE ***
      # We add 'archive-redirect' to the list. Traefik checks middlewares in order.
      # If the URL matches the archive regex, it redirects immediately.
      # If not, it continues to root-redirect, etc.
      - "traefik.http.routers.frontend.middlewares=archive-redirect,root-redirect,lat-redirect"

      - "traefik.http.routers.frontend.priority=1"

    environment:
      NEXT_PUBLIC_BASE_URL: http://backend:8080/api
      NEXT_PUBLIC_CLIENT_API_URL: https://admin.pravda.rs/api
      REVALIDATION_SECRET: "$$2y$$05$$kfg4UClWr0n1pIyUbtX2kOzO6b/3CWcOaWtv6Ak/q.4HjpuaEGeT."
    volumes:
      - next-frontend-cache:/app/.next/cache
    networks:
      - app-network

  admin:
    image: ghcr.io/lazarvuksanovic/pravda-admin:latest
    container_name: pravda-admin
    depends_on:
      - backend
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.admin.rule=Host(`admin.pravda.rs`)"
      - "traefik.http.routers.admin.entrypoints=websecure"
      - "traefik.http.routers.admin.tls.certresolver=myresolver"
      - "traefik.http.services.admin.loadbalancer.server.port=3000"
      - "traefik.http.routers.admin.priority=10"
      - "com.centurylinklabs.watchtower.enable=true"
    environment:
      NEXT_PUBLIC_BASE_URL: http://backend:8080/api
      NEXT_PUBLIC_CLIENT_API_URL: https://admin.pravda.rs/api
      NODE_ENV: production
      TZ: Europe/Belgrade
    expose:
      - 3000
    restart: always
    networks:
      - app-network

  backend:
    image: ghcr.io/lazarvuksanovic/pravda-article-service:latest
    container_name: pravda-article-service
    restart: unless-stopped
    depends_on:
      - db
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.backend.rule=Host(`admin.pravda.rs`) && PathPrefix(`/api`)"
      - "traefik.http.routers.backend.entrypoints=websecure"
      - "traefik.http.routers.backend.tls.certresolver=myresolver"
      - "traefik.http.services.backend.loadbalancer.server.port=8080"
      - "com.centurylinklabs.watchtower.enable=true"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/pravda
      SPRING_DATASOURCE_USERNAME: pravda
      SPRING_DATASOURCE_PASSWORD: pravda
      SPRING_JPA_HIBERNATE_DDL_AUTO: none
      SPRING_LIQUIBASE_ENABLED: "true"
      SPRING_LIQUIBASE_CHANGE_LOG: classpath:/db/changelog/db.changelog-master.yaml
      APPLICATION_FRONTEND_URL: http://frontend:3000
      APPLICATION_FRONTEND_REVALIDATE_SECRET: "$$2y$$05$$kfg4UClWr0n1pIyUbtX2kOzO6b/3CWcOaWtv6Ak/q.4HjpuaEGeT."
      TZ: Europe/Belgrade
      LOGGING_LEVEL_ROOT: INFO
    expose:
      - 8080
    networks:
      - app-network

  db:
    image: postgres:16-alpine
    container_name: pravda-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: pravda
      POSTGRES_USER: pravda
      POSTGRES_PASSWORD: pravda
    expose:
      - 5432
    volumes:
      - pravda_db_data:/var/lib/postgresql/data
    networks:
      - app-network

volumes:
  next-frontend-cache:
  pravda_db_data:
  letsencrypt:

networks:
  app-network:
    driver: bridge