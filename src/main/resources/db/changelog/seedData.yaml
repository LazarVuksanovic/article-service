databaseChangeLog:
  - changeSet:
      id: 1.0.1-seed-categories
      author: pravda-team
      changes:
        - insert:
            tableName: category
            columns:
              - column: { name: id, value: a0eebc99-9c0b-4ef8-bb6d-6bb9bd380a11 }
              - column:
                  name: name
                  valueComputed: >-
                    '{"en":"Politics","sr-Latn":"Politika","sr-Cyrl":"Политика"}'::jsonb
              - column: { name: parent_id, value: null }
              - column: { name: slug, value: politika }

        - insert:
            tableName: category
            columns:
              - column: { name: id, value: a0eebc99-9c0b-4ef8-bb6d-6bb9bd380a12 }
              - column:
                  name: name
                  valueComputed: >-
                    '{"en":"Domestic","sr-Latn":"Domaće","sr-Cyrl":"Домаће"}'::jsonb
              - column:
                  name: parent_id
                  valueComputed: >
                    (SELECT id FROM category
                     WHERE name @> '{"en":"Politics"}'::jsonb LIMIT 1)
              - column: { name: slug, value: domaće }

        - insert:
            tableName: category
            columns:
              - column: { name: id, value: a0eebc99-9c0b-4ef8-bb6d-6bb9bd380a13 }
              - column:
                  name: name
                  valueComputed: >-
                    '{"en":"World","sr-Latn":"Svet","sr-Cyrl":"Свет"}'::jsonb
              - column:
                  name: parent_id
                  valueComputed: >
                    (SELECT id FROM category
                     WHERE name @> '{"en":"Politics"}'::jsonb LIMIT 1)
              - column: { name: slug, value: svet }

