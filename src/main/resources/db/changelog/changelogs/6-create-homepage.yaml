databaseChangeLog:
  - changeSet:
      id: 1.0.0-homepage-tables-refactor
      author: pravda
      changes:
        - createTable:
            tableName: home_page_nav_categories
            columns:
              - column: { name: home_page_id, type: UUID, constraints: { nullable: false } }
              - column: { name: nav_categories_id, type: UUID, constraints: { nullable: false } }
              - column: { name: priority, type: INT, constraints: { nullable: false } }

        - createTable:
            tableName: article_section
            columns:
              - column: { name: id, type: UUID, constraints: { primaryKey: true, nullable: false } }
              - column: { name: category_id, type: UUID }
              - column: { name: article_id, type: UUID, constraints: { nullable: false } }
              - column: { name: section, type: VARCHAR(50), constraints: { nullable: false } }
              - column: { name: sort_order, type: INT, constraints: { nullable: false } }

        - addForeignKeyConstraint:
            baseTableName: article_section
            baseColumnNames: category_id
            referencedTableName: category
            referencedColumnNames: id
            constraintName: fk_as_category
            onDelete: CASCADE

        - addForeignKeyConstraint:
            baseTableName: article_section
            baseColumnNames: article_id
            referencedTableName: article
            referencedColumnNames: id
            constraintName: fk_as_article
            onDelete: CASCADE

        - createIndex:
            tableName: article_section
            indexName: idx_article_section_cat
            columns:
              - column: { name: category_id }