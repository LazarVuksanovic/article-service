databaseChangeLog:
  - changeSet:
      id: 1.0.0-category-table
      author: pravda-team
      changes:
        - createTable:
            tableName: category
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: parent_id
                  type: UUID

              - column:
                  name: slug
                  type: VARCHAR(100)
                  constraints:
                    nullable: false

              - column:
                  name: name
                  type: jsonb
                  defaultValueComputed: "'{}'::jsonb"
                  constraints:
                    nullable: false

        - addForeignKeyConstraint:
            baseTableName: category
            baseColumnNames: parent_id
            referencedTableName: category
            referencedColumnNames: id
            constraintName: fk_category_parent
            onDelete: SET NULL